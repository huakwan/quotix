<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src 'self'"
    />
    <style>
      :root {
        --fg: rgba(255, 255, 255, 0.94);
        --muted: rgba(255, 255, 255, 0.52);
        --track: rgba(255, 255, 255, 0.18);
        --separator: rgba(255, 255, 255, 0.16);
        --control: rgba(255, 255, 255, 0.12);
        --control-hover: rgba(255, 255, 255, 0.18);
        --selected-control: rgba(255, 255, 255, 0.35);
        --selected-border: rgba(0, 0, 0, 0.32);
        --selected-shadow: rgba(0, 0, 0, 0.28);
        --green: #35c759;
        --amber: #ffcc00;
        --red: #ff453a;
        --guide: #ff6a00;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --fg: #000000;
          --muted: rgba(40, 40, 46, 0.95);
          --track: rgba(60, 60, 67, 0.26);
          --separator: rgba(60, 60, 67, 0.26);
          --control: rgba(118, 118, 128, 0.24);
          --control-hover: rgba(118, 118, 128, 0.3);
          --selected-control: rgba(255, 255, 255, 0.4);
          --selected-border: rgba(0, 0, 0, 0.08);
          --selected-shadow: rgba(0, 0, 0, 0.1);
        }
      }

      .codex-logo {
        filter: invert(1);
      }

      @media (prefers-color-scheme: light) {
        .codex-logo {
          filter: none;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: transparent;
      }
      body {
        font:
          12px -apple-system,
          system-ui,
          sans-serif;
        color: var(--fg);
        -webkit-user-select: none;
        user-select: none;
      }
      .panel {
        background: transparent;
        padding: 20px 14px 12px 14px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 7px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .source-section + .source-section {
        border-top: 1px solid var(--separator);
        margin-top: 12px;
        padding-top: 12px;
      }
      .header .logo {
        width: 16px;
        height: 16px;
        display: block;
        flex: none;
      }
      .item {
        margin: 8px 0;
      }
      .row {
        display: grid;
        grid-template-columns: 24px 1fr auto;
        align-items: center;
        gap: 8px;
      }
      .row .label {
        color: var(--muted);
        font-weight: 600;
      }
      .track {
        position: relative;
        height: 6px;
        border-radius: 3px;
        background: var(--track);
      }
      .fill {
        height: 100%;
        border-radius: 3px;
        width: 0%;
      }
      .guide {
        position: absolute;
        top: 50%;
        width: 2px;
        height: 8.5px;
        border-radius: 20px;
        background: var(--guide);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      .pct {
        font-variant-numeric: tabular-nums;
        min-width: 30px;
        text-align: right;
      }
      .reset {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 10px;
        margin-top: 3px;
        padding-left: 32px;
      }
      .updated {
        color: var(--muted);
        font-size: 11px;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 5px;
      }
      .info {
        position: relative;
        display: flex;
        align-items: center;
        color: var(--red);
        cursor: default;
      }
      .info svg {
        width: 13px;
        height: 13px;
        display: block;
      }
      .info .tooltip {
        position: absolute;
        bottom: calc(100% + 6px);
        right: 0;
        z-index: 10;
        width: max-content;
        max-width: 200px;
        padding: 6px 8px;
        border-radius: 6px;
        background: rgba(30, 30, 32, 0.98);
        color: rgba(255, 255, 255, 0.94);
        font-size: 10px;
        line-height: 1.35;
        text-align: left;
        white-space: normal;
        word-break: break-word;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.12s ease,
          visibility 0.12s ease;
      }
      .info:hover .tooltip {
        opacity: 1;
        visibility: visible;
      }
      .divider {
        height: 1px;
        background: var(--separator);
        margin: 10px 0;
      }
      .divider2 {
        height: 1px;
        background: var(--separator);
        margin: 16px 0;
      }
      .settings {
        padding-bottom: 2px;
      }
      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 6px 0;
      }
      .setting-row .s-label {
        color: var(--muted);
        font-weight: 600;
      }
      .segmented {
        display: flex;
        padding: 2px;
        border-radius: 7px;
        background: var(--control);
      }
      .seg-btn {
        border: 0;
        background: none;
        color: var(--muted);
        font: inherit;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.01em;
        padding: 3px 11px;
        border-radius: 5px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          box-shadow 0.15s ease;
      }
      .seg-btn:hover:not(.active) {
        background: var(--control-hover);
        color: var(--fg);
      }
      .seg-btn.active {
        background: var(--selected-control);
        color: var(--fg);
        font-weight: 600;
        box-shadow:
          0 1px 2px var(--selected-shadow),
          0 0 0 0.5px var(--selected-border);
      }
      .seg-btn:focus {
        outline: none;
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        margin-top: 10px;
      }
      .update-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
      }
      .update-copy {
        min-width: 0;
      }
      .update-label {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.3;
      }
      .update-progress {
        width: 100%;
        height: 4px;
        display: block;
        margin-top: 4px;
        accent-color: var(--green);
      }
      .update-btn {
        border: 0;
        border-radius: 6px;
        padding: 4px 8px;
        background: var(--control);
        color: var(--fg);
        font: inherit;
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
      }
      .update-btn:hover {
        background: var(--control-hover);
      }
      .version {
        color: var(--muted);
        font-size: 10px;
        font-variant-numeric: tabular-nums;
      }
      .footer .actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: none;
        border: 0;
        color: var(--muted);
        font-size: 14px;
        cursor: pointer;
        transition:
          background 0.12s,
          color 0.12s;
      }
      .icon-btn:hover,
      .icon-btn:active {
        background: var(--control-hover);
      }
      .icon-btn:hover {
        color: var(--fg);
      }
      .icon-btn:focus {
        outline: none;
      }
      .icon-btn svg {
        width: 13px;
        height: 13px;
        display: block;
      }
      .unavailable {
        color: var(--muted);
        padding: 8px 0;
        line-height: 1.4;
      }
      .hidden {
        display: none;
      }
      .green {
        background: var(--green);
      }
      .amber {
        background: var(--amber);
      }
      .red {
        background: var(--red);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div id="sources"></div>
      <div class="divider2"></div>
      <div class="settings">
        <div class="setting-row">
          <span class="s-label">Source</span>
          <div class="segmented" id="source-mode">
            <button class="seg-btn" data-value="claude" tabindex="-1">
              Claude
            </button>
            <button class="seg-btn" data-value="codex" tabindex="-1">
              Codex
            </button>
            <button class="seg-btn" data-value="both" tabindex="-1">
              Both
            </button>
          </div>
        </div>
        <div class="setting-row" id="menu-source-row">
          <span class="s-label">Menu bar</span>
          <div class="segmented" id="menu-source">
            <button class="seg-btn" data-value="claude" tabindex="-1">
              Claude
            </button>
            <button class="seg-btn" data-value="codex" tabindex="-1">
              Codex
            </button>
          </div>
        </div>
        <div class="setting-row">
          <span class="s-label">Reset time</span>
          <div class="segmented" id="reset-mode">
            <button class="seg-btn" data-value="countdown" tabindex="-1">
              Countdown
            </button>
            <button class="seg-btn" data-value="clock" tabindex="-1">
              Clock
            </button>
          </div>
        </div>
        <div class="setting-row">
          <span class="s-label">Pace line</span>
          <div class="segmented" id="pace-mode">
            <button class="seg-btn" data-value="on" tabindex="-1">
              On
            </button>
            <button class="seg-btn" data-value="off" tabindex="-1">
              Off
            </button>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="update-row hidden" id="update-row">
        <div class="update-copy">
          <div class="update-label" id="update-label"></div>
          <progress
            class="update-progress hidden"
            id="update-progress"
            max="100"
            value="0"
            aria-label="Update download progress"
          ></progress>
        </div>
        <button class="update-btn hidden" id="update-action" type="button"></button>
      </div>
      <div class="footer">
        <span class="version" id="version"></span>
        <div class="actions">
          <button
            class="icon-btn"
            id="refresh"
            title="Refresh now"
            tabindex="-1"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 12a9 9 0 1 1-2.64-6.36" />
              <path d="M21 3v6h-6" />
            </svg>
          </button>
          <button class="icon-btn" id="quit" title="Quit" tabindex="-1">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M12 3v9" />
              <path d="M6.4 6.4a9 9 0 1 0 11.2 0" />
            </svg>
          </button>
        </div>
      </div>
    </div>
    <script src="popoverRenderer.js"></script>
  </body>
</html>
